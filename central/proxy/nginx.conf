events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS. Combined with a *variable* in proxy_pass below, this
    # makes nginx re-resolve the upstream container names at runtime instead of
    # caching the IP once at startup. Without it, when fastapi/next/next-admin
    # restart (deploy OR crash-recovery) they get a new IP and nginx keeps hitting
    # the dead old one — 502 "connect() failed (111: Connection refused)" until the
    # proxy is manually restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name cl4ws.com www.cl4ws.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name cl4ws.com www.cl4ws.com;
        http2 on;

        ssl_certificate     /etc/letsencrypt/live/cl4ws.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cl4ws.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    
        location /video_feed/ {
            proxy_pass http://host.docker.internal:8889/video_feed/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
        
        location /video_api/ {
            proxy_pass http://host.docker.internal:9997/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location / {
            set $upstream_next claw_next:3000;
            proxy_pass http://$upstream_next;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # Disable buffering for streaming support
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
        }

    	location /socket.io/ {
            # No URI on proxy_pass: with a variable upstream, nginx passes the
            # request URI (/socket.io/...) through unchanged. The location prefix
            # already IS the upstream path, so this is equivalent to the old
            # http://claw_fastapi:5000/socket.io/ but re-resolves the IP.
            set $upstream_api claw_fastapi:5000;
            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # Disable buffering for streaming support
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
        }
    }

    # ─── Admin subdomain ────────────────────────────────────────────────
    # admin.cl4ws.com — UI + /admin/* API. ACME-challenge location stays so
    # renewal via `certbot renew --webroot` (see deploy.sh cron) works without
    # extra config.
    server {
        listen 80;
        server_name admin.cl4ws.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name admin.cl4ws.com;
        http2 on;

        ssl_certificate     /etc/letsencrypt/live/admin.cl4ws.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.cl4ws.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location /admin/ {
            set $upstream_api claw_fastapi:5000;
            proxy_pass http://$upstream_api;   # passes /admin/... through unchanged
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            set $upstream_admin claw_next_admin:3001;
            proxy_pass http://$upstream_admin;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
        }
    }
}