events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name cl4ws.com www.cl4ws.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name cl4ws.com www.cl4ws.com;
        http2 on;

        ssl_certificate     /etc/letsencrypt/live/cl4ws.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cl4ws.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    
        location /video_feed/ {
            proxy_pass http://host.docker.internal:8889/video_feed/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
        
        location /video_api/ {
            proxy_pass http://host.docker.internal:9997/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://claw_next:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
    
            # Disable buffering for streaming support
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
        }

    	location /socket.io/ {
            proxy_pass http://claw_fastapi:5000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # Disable buffering for streaming support
            proxy_buffering off;
            proxy_set_header X-Accel-Buffering no;
        }
    }

    # ─── Admin subdomain ────────────────────────────────────────────────
    # admin.cl4ws.com — UI + /admin/* API.
    #
    # The HTTP block below serves ACME challenges so certbot can issue a
    # cert without first touching nginx config. The HTTPS block is COMMENTED
    # OUT by default — uncomment after the first successful certbot run, or
    # nginx will refuse to start with "cannot load certificate".
    #
    # First-time setup:
    #   1. Point admin.cl4ws.com → this server in DNS (A record).
    #   2. With this config deployed (HTTPS block still commented), run:
    #        docker compose run --rm proxy certbot certonly --webroot \
    #          -w /var/www/certbot -d admin.cl4ws.com
    #      (or your existing certbot workflow against this host).
    #   3. Uncomment the HTTPS block below.
    #   4. docker compose exec proxy nginx -s reload
    server {
        listen 80;
        server_name admin.cl4ws.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Until the cert is issued, serve a placeholder rather than redirecting
        # to https — the redirect would land on a server block that doesn't
        # exist yet and confuse anyone hitting the URL.
        location / {
            return 503 "admin.cl4ws.com — cert not yet provisioned\n";
            default_type text/plain;
        }
    }

