services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: claw_media 
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
    network_mode: "host"
    
  proxy:
    container_name: claw_proxy
    image: nginx:latest
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - next
      - next-admin
      - fastapi
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
      - claw_certbot_etc:/etc/letsencrypt
      - claw_certbot_www:/var/www/certbot
    networks:
      - claw_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  next:
    container_name: claw_next
    build: ./next
    expose:
      - '3000'
    environment:
      - NODE_ENV=production
    env_file: .env.prod
    networks:
      - claw_network

  next-admin:
    container_name: claw_next_admin
    build:
      context: ./next-admin
      # NEXT_PUBLIC_* must be inlined at build time. Compose interpolates
      # these from its own env (which it loads from .env by default — pass
      # --env-file .env.admin too on build to layer the admin creds in).
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_ADMIN_API_BASE: ${NEXT_PUBLIC_ADMIN_API_BASE:-}
    expose:
      - '3001'
    environment:
      - NODE_ENV=production
    env_file:
      - .env.prod
      - path: .env.admin
        required: false
    networks:
      - claw_network

  # NOTE: no `db` service in prod — prod runs against the Supabase "Claws"
  # project via $DATABASE_URL (see .env). Local dev still uses a compose
  # Postgres; that lives in docker-compose.dev.yml.
  #
  # Alembic owns the schema in both, so the same migrations apply to either.
  # update.sh runs `alembic upgrade head` against $DATABASE_URL before the app
  # restarts, so a deploy brings Supabase to head automatically.

  fastapi:
    container_name: claw_fastapi
    build: ./fastapi
    expose:
      - '5000'
    env_file:
      - .env.prod
      - path: .env.admin
        required: false
    networks:
      - claw_network

volumes:
  claw_certbot_etc:
    external: true
  claw_certbot_www:
    external: true

networks:
  claw_network:
    name: claw_network
    driver: bridge
