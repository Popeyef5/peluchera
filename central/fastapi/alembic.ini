# Alembic config. The DB URL is injected at runtime from $DATABASE_URL in
# env.py (psycopg3 is sync-capable, so Alembic reuses the app's connection
# string directly). Same migrations run against local dev and the Supabase
# prod project — only DATABASE_URL changes.

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url is set in env.py from $DATABASE_URL — do not hardcode it here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
