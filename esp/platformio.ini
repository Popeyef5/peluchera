; PlatformIO project: chute subsystem (sensors + RFID + solenoid)
;
; Before first build:
;   cp include/secrets.h.example include/secrets.h
;   # fill in WIFI_SSID / WIFI_PASSWORD / OTA_PASSWORD / OTA_HOSTNAME
;
; Serial upload (first time, USB cable):
;   pio run -t upload
;
; OTA (subsequent upgrades, over WiFi):
;   pio run -t upload --upload-port garra-chute.local

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Use the built-in OTA-capable partition layout (2 app slots + spiffs).
board_build.partitions = default.csv

build_flags =
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    https://github.com/ATrappmann/PN5180-Library.git

; --- Bring-up env: only readers[0] is initialized, the rest are skipped.
; Wire just NSS=16, BUSY=27, RST=26 (+SPI bus) and:
;   pio run -e esp32dev_1reader -t upload
[env:esp32dev_1reader]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DRFID_COUNT=1

; --- OTA env: identical build, different upload transport.
[env:esp32dev_ota]
extends = env:esp32dev
upload_protocol = espota
; Hostname is set in src code via ArduinoOTA.setHostname(); override here
; per-cabinet if needed, e.g. `pio run -e esp32dev_ota -t upload --upload-port 10.0.0.42`.
upload_port = garra-chute.local
upload_flags =
    --auth=${sysenv.GARRA_OTA_PASSWORD}
