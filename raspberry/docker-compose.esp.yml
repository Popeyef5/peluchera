# Overlay that adds the chute ESP32 USB bind. Use when the board is wired in:
#
#   docker compose -f docker-compose.yml -f docker-compose.esp.yml up socket
#
# ESP_PORT defaults to the kernel's stable by-id symlink so the bind doesn't
# break when /dev/ttyUSB* numbering shuffles after reboot. Find the right
# symlink for your board with:
#
#   ls -la /dev/serial/by-id/
#
# and either edit ESP_PORT below or set it in the environment when starting.
# Docker resolves the symlink at runtime and passes the underlying tty
# through to the container as /dev/garra-esp.
services:
  socket:
    devices:
      - ${ESP_PORT:-/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0}:/dev/garra-esp
    environment:
      - ESP_PORT=/dev/garra-esp
