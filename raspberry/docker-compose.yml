services:
  socket:
    build: ./server
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
    # ESP32 chute USB is opt-in via docker-compose.esp.yml so the Pi can
    # boot the server without the board attached (claw-only bring-up).
    expose:
      - '5000'
    network_mode: "host"
    restart: always
    
  ffmpeg:
    build: ./ffmpeg
    devices:
      - '/dev/video0:/dev/video0'
    healthcheck:
      test: >
        curl --silent --fail --max-time 10 
        https://cl4ws.com/video_api/v3/paths/get/video_feed |
        grep -q '"ready":true'
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    command: http localhost:5000 --url=peluchera.ngrok.app --config /etc/ngrok/ngrok.yml
    env_file: ./.env
    network_mode: "host"
    volumes:
      - ./ngrok/ngrok.yml:/etc/ngrok/ngrok.yml

  autoheal:
    restart: always
    image: willfarrell/autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
