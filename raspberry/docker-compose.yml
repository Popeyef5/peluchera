services:
  socket:
    build: ./server
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
      # Chute ESP32 over USB. by-id symlink survives /dev/ttyUSB* reshuffles
      # on reboot. Container always sees it as /dev/garra-esp. Container
      # WILL refuse to start if the ESP isn't plugged in — by design: a
      # missing ESP is a hard failure for the cabinet, not a soft warning.
      - ${ESP_PORT:-/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0}:/dev/garra-esp
    environment:
      - ESP_PORT=/dev/garra-esp
      # Claw end-of-turn opto. Flip CLAW_OPTO_EDGE to falling/both (e.g. after a
      # PSU polarity change) via raspberry/.env, then `docker compose up -d socket`.
      - CLAW_OPTO_EDGE=${CLAW_OPTO_EDGE:-rising}
      - CLAW_OPTO_PULL=${CLAW_OPTO_PULL:-up}
      - CLAW_OPTO_DEBOUNCE_US=${CLAW_OPTO_DEBOUNCE_US:-10000}
    expose:
      - '5000'
    network_mode: "host"
    restart: always
    
  ffmpeg:
    build: ./ffmpeg
    devices:
      - '/dev/video0:/dev/video0'
    healthcheck:
      test: >
        curl --silent --fail --max-time 10 
        https://cl4ws.com/video_api/v3/paths/get/video_feed |
        grep -q '"ready":true'
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    command: http localhost:5000 --url=peluchera.ngrok.app --config /etc/ngrok/ngrok.yml
    env_file: ./.env
    network_mode: "host"
    volumes:
      - ./ngrok/ngrok.yml:/etc/ngrok/ngrok.yml

  autoheal:
    restart: always
    image: willfarrell/autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ── Chute ESP32 firmware flasher ─────────────────────────────────────────
  # One-off, profile-gated so it NEVER starts with `up`. Drive it via
  # ./flash.sh (--ota | --usb), which builds it and runs `pio ... -t upload`.
  #   - host networking: espota's reverse image transfer must reach the ESP on
  #     the LAN; mDNS resolution is done host-side by flash.sh.
  #   - the ESP USB device is mapped for --usb mode (flash.sh stops `socket`
  #     first to free the port). Same "ESP must be plugged in" assumption as
  #     the socket service.
  #   - toolchains/cache persist in garra_pio_cache so re-flashes are fast.
  flasher:
    profiles: ["flash"]
    build: ./flasher
    # Force arm64 even on a 32-bit userland. This Pi runs a 64-bit kernel
    # (uname -m = aarch64) with a 32-bit armv7l userland, so the default build
    # produces a 32-bit image — and PlatformIO's xtensa-esp32 GCC has no working
    # armv7l host binary, so the firmware compile dies with "xtensa-esp32-elf-g++:
    # not found" (Error 127). The aarch64 toolchain is supported; pin the image
    # to arm64 and PlatformIO installs a runnable cross-compiler.
    platform: "linux/arm64"
    network_mode: "host"
    environment:
      - GARRA_OTA_PASSWORD=${GARRA_OTA_PASSWORD:-}
    devices:
      - ${ESP_PORT:-/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0}:/dev/garra-esp
    volumes:
      - ../esp:/project
      - garra_pio_cache:/root/.platformio
    working_dir: /project

volumes:
  garra_pio_cache:
