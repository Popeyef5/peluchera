services:
  socket:
    build: ./server
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
      # Chute ESP32 over USB. by-id symlink survives /dev/ttyUSB* reshuffles
      # on reboot. Container always sees it as /dev/garra-esp. Container
      # WILL refuse to start if the ESP isn't plugged in — by design: a
      # missing ESP is a hard failure for the cabinet, not a soft warning.
      - ${ESP_PORT:-/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0}:/dev/garra-esp
    environment:
      - ESP_PORT=/dev/garra-esp
    expose:
      - '5000'
    network_mode: "host"
    restart: always
    
  ffmpeg:
    build: ./ffmpeg
    devices:
      - '/dev/video0:/dev/video0'
    healthcheck:
      test: >
        curl --silent --fail --max-time 10 
        https://cl4ws.com/video_api/v3/paths/get/video_feed |
        grep -q '"ready":true'
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    restart: always

  ngrok:
    image: ngrok/ngrok:latest
    restart: always
    command: http localhost:5000 --url=peluchera.ngrok.app --config /etc/ngrok/ngrok.yml
    env_file: ./.env
    network_mode: "host"
    volumes:
      - ./ngrok/ngrok.yml:/etc/ngrok/ngrok.yml

  autoheal:
    restart: always
    image: willfarrell/autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
